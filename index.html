<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accueil Combinaison Apps</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;       /* centre horizontalement */
  justify-content: center;   /* centre verticalement */
  min-height: 100vh;
  background: #f0f0f0;
}

#home {
  display: flex;
  flex-direction: column;    /* texte au-dessus, images en dessous */
  align-items: center;       /* centre horizontalement le contenu */
  gap: 20px;                 /* espace entre le texte et les images */
}

#home div {
  display: flex;
  justify-content: center;   /* centre horizontalement */
  gap: 25px;                 /* espace entre les images */
  align-items: center;
}

#home img {
  width: 100px;
  height: 100px;
  object-fit: cover;         
  margin: 5px;
  border-radius: 15px;       /* coins arrondis mais carré */
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  cursor: pointer;
  transition: transform 0.2s;
}

#home img:hover {
  transform: scale(1.1);
}
</style>
</head>
<body>
<div id="home">
  <h1>Bienvenue</h1>
  <div>
    <img src="https://i.postimg.cc/65w5QCDb/IMG-0067.jpg" 
         width="100" height="100" 
         onclick="showApp1()" alt="App 1">
    <img src="https://i.postimg.cc/brP8sjFH/IMG-0069.jpg" 
         width="100" height="100" 
         onclick="showApp2()" alt="App 2">
  </div>
</div>

<div id="app1" style="display:none;">
  <!-- Colle ici tout le code de ton 1er projet (HTML, CSS, JS) -->
</div>

<div id="app2" style="display:none;">
  <!-- Colle ici tout le code de ton 2e projet (HTML, CSS, JS) -->
</div>

<script>
function showApp1() {
  document.getElementById('home').style.display = 'none';
  document.getElementById('app1').style.display = 'block';
}
function showApp2() {
  document.getElementById('home').style.display = 'none';
  document.getElementById('app2').style.display = 'block';
}
function returnHome() {
  document.getElementById('home').style.display = 'block';
  document.getElementById('app1').style.display = 'none';
  document.getElementById('app2').style.display = 'none';
}
</script>
</body>
</html>
